<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="robots" content="noindex, nofollow">
    <title>Диспетчер</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Стили для бейджиков статуса */
        .status-badge { padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: bold; display: inline-block; margin-bottom: 8px;}
        .status-new { background: #e5f1ff; color: #007aff; }
        .status-done { background: #e8f5e9; color: #34c759; }
        
        .ticket-info { font-size: 13px; color: #8e8e93; margin-top: 8px; border-top: 1px solid #f2f2f7; padding-top: 8px;}
    </style>
</head>
<body>

        <!-- ПОЛНОЭКРАННАЯ ЗАГРУЗКА -->
    <div id="globalLoader" class="global-loader">
        <i class="fa-solid fa-circle-notch fa-spin"></i>
        <div id="loaderText" class="loader-text">Загрузка...</div>
    </div>

    <div class="top-bar" id="headerTitle">Новая заявка</div>

    <div class="container">
        
        <!-- ЭКРАН 1: СОЗДАТЬ ЗАЯВКУ -->
        <div id="tab-create" class="tab-content active">
            <div class="card">
                <div id="loading" class="loader"><i class="fa-solid fa-spinner fa-spin"></i> Загрузка базы...</div>

                <div class="form-group">
                    <label><i class="fa-solid fa-location-dot"></i> Адрес:</label>
                    <input type="text" class="form-control" id="address" list="addressList" placeholder="Начните вводить адрес...">
                    <datalist id="addressList"></datalist>
                </div>

                <div class="form-group">
                    <label><i class="fa-solid fa-triangle-exclamation"></i> Проблема:</label>
                    <textarea class="form-control" id="problem" rows="3" placeholder="Опишите, что случилось..."></textarea>
                </div>

                <div class="form-group">
                    <label><i class="fa-solid fa-helmet-safety"></i> Назначить мастера:</label>
                    <input type="text" class="form-control" id="masterInput" list="mastersList" placeholder="Начните вводить ФИО...">
                    <datalist id="mastersList"></datalist>
                </div>

                <button class="btn btn-primary" onclick="sendTicket()">
                    <i class="fa-solid fa-paper-plane"></i> Отправить заявку
                </button>
                <div id="status" class="status-text"></div>
            </div>
        </div>

        <!-- ЭКРАН 2: МОИ ЗАЯВКИ (Теперь он живой!) -->
        <div id="tab-list" class="tab-content">
            <div id="loadingTickets" class="loader" style="display:none;"><i class="fa-solid fa-spinner fa-spin"></i> Загрузка заявок...</div>
            <div id="ticketsContainer"></div>
            
            <div id="noTicketsMsg" class="card" style="display: none; text-align: center; color: #8e8e93; padding: 40px 20px;">
                <i class="fa-solid fa-folder-open" style="font-size: 40px; margin-bottom: 15px; color: #d1d1d6;"></i>
                <h3 style="margin-top: 0; color: #1c1c1e;">Пусто</h3>
                <p>Вы еще не создали ни одной заявки.</p>
            </div>
        </div>

        <!-- ЭКРАН 3: ПРОФИЛЬ -->
        <div id="tab-profile" class="tab-content">
            <div class="card" style="text-align: center;">
                <div style="background: #e5f1ff; color: #007aff; width: 60px; height: 60px; border-radius: 30px; display: flex; align-items: center; justify-content: center; font-size: 24px; margin: 0 auto 15px auto;">
                    <i class="fa-solid fa-user-tie"></i>
                </div>
                <h2 style="margin: 0 0 5px 0; color: #1c1c1e;" id="profileName">Загрузка...</h2>
                <p style="margin: 0 0 20px 0; color: #8e8e93; font-weight: 600;">Диспетчер</p>
                
                <button class="btn btn-danger" onclick="logout()">
                    <i class="fa-solid fa-arrow-right-from-bracket"></i> Выйти из аккаунта
                </button>
            </div>
        </div>

    </div>

    <!-- НИЖНЕЕ МЕНЮ -->
    <div class="bottom-nav">
        <div class="nav-item active" onclick="switchTab('create')" id="nav-create">
            <i class="fa-solid fa-plus"></i>
            <span>Создать</span>
        </div>
        <div class="nav-item" onclick="switchTab('list')" id="nav-list">
            <i class="fa-solid fa-folder-open"></i>
            <span>Заявки</span>
        </div>
        <div class="nav-item" onclick="switchTab('profile')" id="nav-profile">
            <i class="fa-solid fa-user"></i>
            <span>Профиль</span>
        </div>
    </div>

 <script>

    const URL_GOOGLE_SERVER = "https://script.google.com/macros/s/AKfycby7iLGZuySy2ZtphSWBgk0bkRteCTo7jn71apvREIXJVIw-ssVZvFwoeD1zgx3Slhi99A/exec";
    
    let currentUser = null;

    function showLoader(text) {
        document.getElementById("loaderText").innerText = text;
        document.getElementById("globalLoader").classList.add("active");
    }
    function hideLoader() { document.getElementById("globalLoader").classList.remove("active"); }

    window.onload = async function() {
        const userStr = localStorage.getItem("currentUser");
        if (!userStr) { window.location.href = "index.html"; return; }
        currentUser = JSON.parse(userStr);
        if (currentUser.role !== "диспетчер") { window.location.href = "index.html"; return; }
        document.getElementById("profileName").innerText = currentUser.name;
        await loadDatabase();
    };

    function switchTab(tabName) {
        document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
        document.getElementById('tab-' + tabName).classList.add('active');
        document.getElementById('nav-' + tabName).classList.add('active');
        const titles = { 'create': 'Новая заявка', 'list': 'История заявок', 'profile': 'Профиль' };
        document.getElementById('headerTitle').innerText = titles[tabName];

        if (tabName === 'list') loadMyTickets();
    }

    async function loadDatabase() {
        showLoader("Подгрузка базы адресов...");
        try {
            const addrResponse = await fetch(URL_GOOGLE_SERVER + "?action=getAddresses");
            const addresses = await addrResponse.json();
            const addrDatalist = document.getElementById("addressList");
            addresses.forEach(addr => { let option = document.createElement("option"); option.value = addr; addrDatalist.appendChild(option); });

            const usersResponse = await fetch(URL_GOOGLE_SERVER);
            const users = await usersResponse.json();
            const masterDatalist = document.getElementById("mastersList");
            users.forEach(user => {
                if (user.role === "мастер") { let option = document.createElement("option"); option.value = user.name; masterDatalist.appendChild(option); }
            });
            hideLoader();
        } catch (error) { hideLoader(); alert("Ошибка загрузки базы"); }
    }

    async function sendTicket() {
        const address = document.getElementById("address").value.trim();
        const problem = document.getElementById("problem").value.trim();
        const master = document.getElementById("masterInput").value.trim();
        const statusDiv = document.getElementById("status");

        if (!address || !problem || !master) { statusDiv.innerText = "Заполните все поля!"; statusDiv.style.color = "#ff3b30"; return; }

        showLoader("Отправка заявки...");

        const ticketData = { dispatcherName: currentUser.name, address: address, problem: problem, masterName: master };
        try {
            const response = await fetch(URL_GOOGLE_SERVER, { method: "POST", body: JSON.stringify(ticketData), headers: { "Content-Type": "text/plain;charset=utf-8" }});
            const result = await response.json();
            if (result.status === "success") {
                hideLoader();
                statusDiv.innerHTML = '<i class="fa-solid fa-check"></i> Успешно отправлено!';
                statusDiv.style.color = "#34c759";
                document.getElementById("address").value = ""; document.getElementById("problem").value = ""; document.getElementById("masterInput").value = "";
                setTimeout(() => { statusDiv.innerText = ""; }, 3000);
            }
        } catch (error) { hideLoader(); statusDiv.innerText = "Ошибка связи."; statusDiv.style.color = "#ff3b30"; }
    }

    async function loadMyTickets() {
        showLoader("Обновление списка...");
        document.getElementById("ticketsContainer").innerHTML = "";
        document.getElementById("noTicketsMsg").style.display = "none";

        try {
            const response = await fetch(URL_GOOGLE_SERVER + "?action=getDispatcherTickets&dispatcherName=" + encodeURIComponent(currentUser.name));
            const tickets = await response.json();
            hideLoader();

            if (tickets.length === 0) { document.getElementById("noTicketsMsg").style.display = "block"; return; }

            const container = document.getElementById("ticketsContainer");
            tickets.forEach(ticket => {
                const div = document.createElement("div");
                div.className = "card";
                let badgeClass = ticket.status === "Новая" ? "status-new" : "status-done";
                let statusIcon = ticket.status === "Новая" ? "fa-clock" : "fa-check-double";
                div.innerHTML = `
                    <div class="status-badge ${badgeClass}"><i class="fa-solid ${statusIcon}"></i> ${ticket.status}</div>
                    <div style="font-weight: bold; font-size: 16px; margin-bottom: 4px;">${ticket.address}</div>
                    <div style="font-size: 14px; color: #3a3a3c;">${ticket.problem}</div>
                    <div class="ticket-info"><div><i class="fa-regular fa-calendar-days"></i> ${ticket.date}</div><div style="margin-top: 4px;"><i class="fa-solid fa-helmet-safety"></i> Мастер: ${ticket.master}</div></div>
                `;
                container.appendChild(div);
            });
        } catch (error) { hideLoader(); alert('Ошибка загрузки истории.'); }
    }

    function logout() { localStorage.removeItem("currentUser"); window.location.href = "index.html"; }
</script>
</body>
</html>
