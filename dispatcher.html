<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="robots" content="noindex, nofollow">
    <title>Диспетчер</title>
    
    <!-- Подключаем наш красивый CSS -->
    <link rel="stylesheet" href="styles.css">
    
    <!-- Подключаем иконки FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="top-bar" id="headerTitle">Новая заявка</div>

    <div class="container">
        
        <!-- ЭКРАН 1: СОЗДАТЬ ЗАЯВКУ -->
        <div id="tab-create" class="tab-content active">
            <div class="card">
                <div id="loading" class="loader"><i class="fa-solid fa-spinner fa-spin"></i> Загрузка базы...</div>

                <div class="form-group">
                    <label><i class="fa-solid fa-location-dot"></i> Адрес:</label>
                    <input type="text" class="form-control" id="address" list="addressList" placeholder="Начните вводить адрес...">
                    <datalist id="addressList"></datalist>
                </div>

                <div class="form-group">
                    <label><i class="fa-solid fa-triangle-exclamation"></i> Проблема:</label>
                    <textarea class="form-control" id="problem" rows="3" placeholder="Опишите, что случилось..."></textarea>
                </div>

                <div class="form-group">
                    <label><i class="fa-solid fa-helmet-safety"></i> Назначить мастера:</label>
                    <input type="text" class="form-control" id="masterInput" list="mastersList" placeholder="Начните вводить ФИО...">
                    <datalist id="mastersList"></datalist>
                </div>

                <button class="btn btn-primary" onclick="sendTicket()">
                    <i class="fa-solid fa-paper-plane"></i> Отправить заявку
                </button>
                <div id="status" class="status-text"></div>
            </div>
        </div>

        <!-- ЭКРАН 2: МОИ ЗАЯВКИ (Заглушка) -->
        <div id="tab-list" class="tab-content">
            <div class="card" style="text-align: center; color: #8e8e93; padding: 40px 20px;">
                <i class="fa-solid fa-list-check" style="font-size: 40px; margin-bottom: 15px; color: #d1d1d6;"></i>
                <h3 style="margin-top: 0; color: #1c1c1e;">Ваши заявки</h3>
                <p>Здесь будет список созданных вами заявок и возможность их изменять. Скоро подключим!</p>
            </div>
        </div>

        <!-- ЭКРАН 3: ПРОФИЛЬ -->
        <div id="tab-profile" class="tab-content">
            <div class="card" style="text-align: center;">
                <div style="background: #e5f1ff; color: #007aff; width: 60px; height: 60px; border-radius: 30px; display: flex; align-items: center; justify-content: center; font-size: 24px; margin: 0 auto 15px auto;">
                    <i class="fa-solid fa-user-tie"></i>
                </div>
                <h2 style="margin: 0 0 5px 0; color: #1c1c1e;" id="profileName">Загрузка...</h2>
                <p style="margin: 0 0 20px 0; color: #8e8e93; font-weight: 600;">Диспетчер</p>
                
                <button class="btn btn-danger" onclick="logout()">
                    <i class="fa-solid fa-arrow-right-from-bracket"></i> Выйти из аккаунта
                </button>
            </div>
        </div>

    </div>

    <!-- НИЖНЕЕ МЕНЮ С ИКОНКАМИ FONTAWESOME -->
    <div class="bottom-nav">
        <div class="nav-item active" onclick="switchTab('create')" id="nav-create">
            <i class="fa-solid fa-plus"></i>
            <span>Создать</span>
        </div>
        <div class="nav-item" onclick="switchTab('list')" id="nav-list">
            <i class="fa-solid fa-folder-open"></i>
            <span>Заявки</span>
        </div>
        <div class="nav-item" onclick="switchTab('profile')" id="nav-profile">
            <i class="fa-solid fa-user"></i>
            <span>Профиль</span>
        </div>
    </div>

    <script>
        // === ВАЖНО: ВСТАВЬ СВОЮ ССЫЛКУ НИЖЕ ===
        const URL_GOOGLE_SERVER = "https://script.google.com/macros/s/AKfycby7iLGZuySy2ZtphSWBgk0bkRteCTo7jn71apvREIXJVIw-ssVZvFwoeD1zgx3Slhi99A/exec";
        
        let currentUser = null;

        window.onload = async function() {
            const userStr = localStorage.getItem("currentUser");
            if (!userStr) { window.location.href = "index.html"; return; }
            currentUser = JSON.parse(userStr);
            if (currentUser.role !== "диспетчер") { window.location.href = "index.html"; return; }

            document.getElementById("profileName").innerText = currentUser.name;
            await loadDatabase();
        };

        // Логика переключения меню
        function switchTab(tabName) {
            // Скрываем все экраны и делаем иконки серыми
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
            
            // Показываем нужный экран и красим иконку в синий
            document.getElementById('tab-' + tabName).classList.add('active');
            document.getElementById('nav-' + tabName).classList.add('active');
            
            // Меняем заголовок наверху
            const titles = { 'create': 'Новая заявка', 'list': 'Мои заявки', 'profile': 'Профиль' };
            document.getElementById('headerTitle').innerText = titles[tabName];
        }

        // Подгрузка базы
        async function loadDatabase() {
            try {
                const addrResponse = await fetch(URL_GOOGLE_SERVER + "?action=getAddresses");
                const addresses = await addrResponse.json();
                const addrDatalist = document.getElementById("addressList");
                addresses.forEach(addr => {
                    let option = document.createElement("option"); option.value = addr; addrDatalist.appendChild(option);
                });

                const usersResponse = await fetch(URL_GOOGLE_SERVER);
                const users = await usersResponse.json();
                const masterDatalist = document.getElementById("mastersList");
                users.forEach(user => {
                    if (user.role === "мастер") {
                        let option = document.createElement("option"); option.value = user.name; masterDatalist.appendChild(option);
                    }
                });
                document.getElementById("loading").style.display = "none";
            } catch (error) {
                document.getElementById("loading").innerHTML = '<i class="fa-solid fa-triangle-exclamation"></i> Ошибка загрузки базы.';
                document.getElementById("loading").style.color = "#ff3b30";
            }
        }

        // Отправка заявки
        async function sendTicket() {
            const address = document.getElementById("address").value.trim();
            const problem = document.getElementById("problem").value.trim();
            const master = document.getElementById("masterInput").value.trim();
            const statusDiv = document.getElementById("status");

            if (!address || !problem || !master) {
                statusDiv.innerText = "Заполните все поля!";
                statusDiv.style.color = "#ff3b30";
                return;
            }

            statusDiv.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Отправляем...';
            statusDiv.style.color = "#007aff";

            const ticketData = { dispatcherName: currentUser.name, address: address, problem: problem, masterName: master };

            try {
                const response = await fetch(URL_GOOGLE_SERVER, {
                    method: "POST",
                    body: JSON.stringify(ticketData),
                    headers: { "Content-Type": "text/plain;charset=utf-8" }
                });
                const result = await response.json();
                
                if (result.status === "success") {
                    statusDiv.innerHTML = '<i class="fa-solid fa-check"></i> Успешно отправлено!';
                    statusDiv.style.color = "#34c759";
                    document.getElementById("address").value = "";
                    document.getElementById("problem").value = "";
                    document.getElementById("masterInput").value = "";
                    setTimeout(() => { statusDiv.innerText = ""; }, 3000);
                }
            } catch (error) {
                statusDiv.innerText = "Ошибка связи сервером.";
                statusDiv.style.color = "#ff3b30";
            }
        }

        function logout() {
            localStorage.removeItem("currentUser");
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
