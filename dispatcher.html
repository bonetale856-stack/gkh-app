<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="robots" content="noindex, nofollow">
    <title>Диспетчер</title>
    
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .status-badge { padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: bold; display: inline-block; margin-bottom: 8px;}
        .status-new { background: #e5f1ff; color: #007aff; }
        .status-done { background: #e8f5e9; color: #34c759; }
        .ticket-info { font-size: 13px; color: #8e8e93; margin-top: 8px; border-top: 1px solid #f2f2f7; padding-top: 8px;}
        
        /* Стили для профиля и статистики (как у мастера) */
        .stats-grid { display: flex; gap: 10px; margin-bottom: 20px; }
        .stat-box { flex: 1; background: #f9f9f9; padding: 15px; border-radius: 12px; text-align: center; border: 1px solid #eee; }
        .stat-num { font-size: 24px; font-weight: 800; color: #007aff; margin-bottom: 5px; }
        .stat-label { font-size: 12px; color: #8e8e93; font-weight: 600; text-transform: uppercase;}
        
        .badge-card { background: linear-gradient(135deg, #e5f1ff, #bbdefb); padding: 15px; border-radius: 12px; display: flex; align-items: center; gap: 15px; margin-bottom: 20px;}
        .badge-icon { font-size: 35px; color: #007aff; }
        .badge-text h4 { margin: 0 0 5px 0; color: #1c1c1e; font-size: 16px;}
        .badge-text p { margin: 0; font-size: 13px; color: #0d47a1;}
    </style>
</head>
<body>

    <!-- ЭКРАН ЗАГРУЗКИ -->
    <div id="globalLoader" class="global-loader">
        <i class="fa-solid fa-circle-notch fa-spin"></i>
        <div id="loaderText" class="loader-text">Загрузка...</div>
    </div>

    <div class="top-bar" id="headerTitle">Новая заявка</div>

    <div class="container">
        
        <!-- ЭКРАН 1: СОЗДАТЬ ЗАЯВКУ -->
        <div id="tab-create" class="tab-content active">
            <div class="card">
                <div class="form-group">
                    <label><i class="fa-solid fa-location-dot"></i> Адрес:</label>
                    <input type="text" class="form-control" id="address" list="addressList" placeholder="Начните вводить адрес...">
                    <datalist id="addressList"></datalist>
                </div>
                <div class="form-group">
                    <label><i class="fa-solid fa-triangle-exclamation"></i> Проблема:</label>
                    <textarea class="form-control" id="problem" rows="3" placeholder="Опишите, что случилось..."></textarea>
                </div>
                <div class="form-group">
                    <label><i class="fa-solid fa-helmet-safety"></i> Назначить мастера:</label>
                    <input type="text" class="form-control" id="masterInput" list="mastersList" placeholder="Начните вводить ФИО...">
                    <datalist id="mastersList"></datalist>
                </div>
                <button class="btn btn-primary" onclick="sendTicket()">
                    <i class="fa-solid fa-paper-plane"></i> Отправить заявку
                </button>
            </div>
        </div>

        <!-- ЭКРАН 2: ИСТОРИЯ ЗАЯВОК -->
        <div id="tab-list" class="tab-content">
            <div id="ticketsContainer"></div>
            <div id="noTicketsMsg" class="card" style="display: none; text-align: center; color: #8e8e93; padding: 40px 20px;">
                <i class="fa-solid fa-folder-open" style="font-size: 40px; margin-bottom: 15px; color: #d1d1d6;"></i>
                <h3 style="margin-top: 0; color: #1c1c1e;">Пусто</h3>
                <p>Вы еще не создали ни одной заявки.</p>
            </div>
        </div>

        <!-- ЭКРАН 3: ПРОФИЛЬ -->
        <div id="tab-profile" class="tab-content">
            <div class="card" style="text-align: center; margin-bottom: 15px; border-bottom: 4px solid #007aff;">
                <h2 style="margin: 0 0 5px 0; color: #1c1c1e;" id="profileName">Загрузка...</h2>
                <p style="margin: 0; color: #8e8e93; font-weight: 600;">Диспетчер</p>
            </div>

            <!-- Мотивация -->
            <div class="card" style="background: linear-gradient(135deg, #007aff, #0056b3); color: white; border: none; margin-bottom: 15px;">
                <h3 style="margin: 0 0 5px 0;"><i class="fa-solid fa-headset"></i> На связи!</h3>
                <p style="margin: 0; font-size: 14px; opacity: 0.9;">Ваш голос успокаивает жильцов. Спасибо за вашу выдержку!</p>
            </div>

            <!-- Карточка Достижения -->
            <div class="badge-card" id="achievementBadge">
                <div class="badge-icon"><i class="fa-solid fa-medal" id="badgeIcon"></i></div>
                <div class="badge-text">
                    <h4 id="badgeTitle">Загружаем ранг...</h4>
                    <p id="badgeDesc">...</p>
                </div>
            </div>

            <!-- Статистика -->
            <div class="stats-grid">
                <div class="stat-box">
                    <div class="stat-num" id="statMonthly">0</div>
                    <div class="stat-label">Оформлено<br><span style="color:#007aff; font-size:10px;">в этом месяце</span></div>
                </div>
                <div class="stat-box">
                    <div class="stat-num" id="statAllTime" style="color: #34c759;">0</div>
                    <div class="stat-label">Всего заявок<br><span style="color:#007aff; font-size:10px;">за всё время</span></div>
                </div>
            </div>

            <button class="btn btn-danger" onclick="logout()">
                <i class="fa-solid fa-arrow-right-from-bracket"></i> Выйти из аккаунта
            </button>
        </div>

    </div>

    <!-- НИЖНЕЕ МЕНЮ -->
    <div class="bottom-nav">
        <div class="nav-item active" onclick="switchTab('create')" id="nav-create">
            <i class="fa-solid fa-plus"></i><span>Создать</span>
        </div>
        <div class="nav-item" onclick="switchTab('list')" id="nav-list">
            <i class="fa-solid fa-folder-open"></i><span>Заявки</span>
        </div>
        <div class="nav-item" onclick="switchTab('profile')" id="nav-profile">
            <i class="fa-solid fa-user"></i><span>Профиль</span>
        </div>
    </div>

    <script>
        // === ВАЖНО: ВСТАВЬ СВОЮ ССЫЛКУ НИЖЕ ===
        const URL_GOOGLE_SERVER = "https://script.google.com/macros/s/AKfycby7iLGZuySy2ZtphSWBgk0bkRteCTo7jn71apvREIXJVIw-ssVZvFwoeD1zgx3Slhi99A/exec";
        
        let currentUser = null;

        function showLoader(text) { document.getElementById("loaderText").innerText = text; document.getElementById("globalLoader").classList.add("active"); }
        function hideLoader() { document.getElementById("globalLoader").classList.remove("active"); }

        window.onload = async function() {
            const userStr = localStorage.getItem("currentUser");
            if (!userStr) { window.location.href = "index.html"; return; }
            currentUser = JSON.parse(userStr);
            if (currentUser.role !== "диспетчер") { window.location.href = "index.html"; return; }

            document.getElementById("profileName").innerText = currentUser.name;
            await loadDatabase();
        };

        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
            document.getElementById('tab-' + tabName).classList.add('active');
            document.getElementById('nav-' + tabName).classList.add('active');
            
            const titles = { 'create': 'Новая заявка', 'list': 'История заявок', 'profile': 'Профиль' };
            document.getElementById('headerTitle').innerText = titles[tabName];

            if (tabName === 'list') loadMyTickets();
            if (tabName === 'profile') loadStats(); // Загружаем статистику профиля!
        }

        async function loadDatabase() {
            showLoader("Подгрузка базы...");
            try {
                const addrResponse = await fetch(URL_GOOGLE_SERVER + "?action=getAddresses");
                const addresses = await addrResponse.json();
                const addrDatalist = document.getElementById("addressList");
                addresses.forEach(addr => { let option = document.createElement("option"); option.value = addr; addrDatalist.appendChild(option); });

                const usersResponse = await fetch(URL_GOOGLE_SERVER);
                const users = await usersResponse.json();
                const masterDatalist = document.getElementById("mastersList");
                users.forEach(user => {
                    if (user.role === "мастер") { let option = document.createElement("option"); option.value = user.name; masterDatalist.appendChild(option); }
                });
                hideLoader();
            } catch (error) { hideLoader(); alert("Ошибка загрузки базы"); }
        }

        // НОВОЕ: Загрузка статистики Диспетчера
        async function loadStats() {
            showLoader("Считаем заявки...");
            try {
                const response = await fetch(URL_GOOGLE_SERVER + "?action=getDispatcherStats&dispatcherName=" + encodeURIComponent(currentUser.name));
                const stats = await response.json();
                hideLoader();

                document.getElementById("statMonthly").innerText = stats.monthlyTickets;
                document.getElementById("statAllTime").innerText = stats.allTimeTickets;

                // Логика рангов
                const titleEl = document.getElementById("badgeTitle");
                const descEl = document.getElementById("badgeDesc");
                const iconEl = document.getElementById("badgeIcon");
                
                const totalAllTime = stats.allTimeTickets;

                if (totalAllTime < 50) {
                    titleEl.innerText = "Надежный тыл 🥉";
                    descEl.innerText = `Вы спасаете жильцов! До следующего ранга: ${50 - totalAllTime} шт.`;
                    iconEl.className = "fa-solid fa-headset";
                    iconEl.style.color = "#8d6e63"; // Бронза
                } else if (totalAllTime < 200) {
                    titleEl.innerText = "Мастер логистики 🥈";
                    descEl.innerText = `Ни одна заявка не потеряется. Вы супер!`;
                    iconEl.className = "fa-solid fa-satellite-dish";
                    iconEl.style.color = "#78909c"; // Серебро
                } else {
                    titleEl.innerText = "Вы опора компании 🥇";
                    descEl.innerText = `Вы контролируете весь город! Легендарный статус.`;
                    iconEl.className = "fa-solid fa-microphone-lines";
                    iconEl.style.color = "#ffb300"; // Золото
                }

            } catch (error) { 
                hideLoader(); 
                alert("Ошибка загрузки профиля."); 
            }
        }

        async function sendTicket() {
            const address = document.getElementById("address").value.trim();
            const problem = document.getElementById("problem").value.trim();
            const master = document.getElementById("masterInput").value.trim();
            if (!address || !problem || !master) { alert("Заполните все поля!"); return; }

            showLoader("Отправка заявки...");
            const ticketData = { dispatcherName: currentUser.name, address: address, problem: problem, masterName: master };
            try {
                const response = await fetch(URL_GOOGLE_SERVER, { method: "POST", body: JSON.stringify(ticketData), headers: { "Content-Type": "text/plain;charset=utf-8" }});
                const result = await response.json();
                if (result.status === "success") {
                    hideLoader();
                    alert("Успешно отправлено!");
                    document.getElementById("address").value = ""; document.getElementById("problem").value = ""; document.getElementById("masterInput").value = "";
                }
            } catch (error) { hideLoader(); alert("Ошибка связи."); }
        }

        async function loadMyTickets() {
            showLoader("Обновление списка...");
            document.getElementById("ticketsContainer").innerHTML = "";
            document.getElementById("noTicketsMsg").style.display = "none";

            try {
                const response = await fetch(URL_GOOGLE_SERVER + "?action=getDispatcherTickets&dispatcherName=" + encodeURIComponent(currentUser.name));
                const tickets = await response.json();
                hideLoader();

                if (tickets.length === 0) { document.getElementById("noTicketsMsg").style.display = "block"; return; }

                const container = document.getElementById("ticketsContainer");
                tickets.forEach(ticket => {
                    const div = document.createElement("div");
                    div.className = "card";
                    let badgeClass = ticket.status === "Новая" ? "status-new" : "status-done";
                    let statusIcon = ticket.status === "Новая" ? "fa-clock" : "fa-check-double";
                    div.innerHTML = `
                        <div class="status-badge ${badgeClass}"><i class="fa-solid ${statusIcon}"></i> ${ticket.status}</div>
                        <div style="font-weight: bold; font-size: 16px; margin-bottom: 4px;">${ticket.address}</div>
                        <div style="font-size: 14px; color: #3a3a3c;">${ticket.problem}</div>
                        <div class="ticket-info"><div><i class="fa-regular fa-calendar-days"></i> ${ticket.date}</div><div style="margin-top: 4px;"><i class="fa-solid fa-helmet-safety"></i> Мастер: ${ticket.master}</div></div>
                    `;
                    container.appendChild(div);
                });
            } catch (error) { hideLoader(); alert('Ошибка загрузки истории.'); }
        }

        function logout() { localStorage.removeItem("currentUser"); window.location.href = "index.html"; }
    </script>
</body>
</html>
