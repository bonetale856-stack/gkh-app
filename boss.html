<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="color-scheme" content="light only">
    <meta name="robots" content="noindex, nofollow">
    <title>Шеф</title>
  <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .money-card { background: linear-gradient(135deg, #34c759, #28a745); color: white; padding: 20px; border-radius: 16px; text-align: center; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(52, 199, 89, 0.3);}
        .money-card h2 { margin: 0; font-size: 32px; font-weight: 800; }
        .money-card p { margin: 5px 0 0 0; font-size: 13px; opacity: 0.9; text-transform: uppercase; font-weight: 600;}
        
        .top-list { list-style: none; padding: 0; margin: 0; }
        .top-list li { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #f2f2f7; font-size: 15px;}
        .top-list li:last-child { border-bottom: none; }
        .top-list li span:first-child { font-weight: 600; color: #1c1c1e; }
        .top-list li span:last-child { color: #007aff; font-weight: bold; }

        /* Стили для заметок шефа */
        .note-item { background: #f9f9f9; border: 1px solid #e5e5ea; border-radius: 12px; padding: 12px; margin-bottom: 10px; display: flex; align-items: flex-start; gap: 10px; transition: 0.2s;}
        .note-item.done { opacity: 0.5; background: #f2f2f7; }
        .note-item.done .note-text { text-decoration: line-through; color: #8e8e93; }
        .note-checkbox { transform: scale(1.3); margin-top: 3px; cursor: pointer;}
        .note-text { flex-grow: 1; font-size: 15px; color: #1c1c1e; word-break: break-word; line-height: 1.4;}
        .note-copy-btn { background: #e5f1ff; color: #007aff; border: none; padding: 6px 10px; border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: bold; transition: 0.2s;}
        .note-copy-btn:active { background: #007aff; color: white; }
        .note-delete { color: #ff3b30; cursor: pointer; padding: 5px; font-size: 16px;}

        .add-note-box { display: flex; gap: 10px; margin-bottom: 20px; }
        .add-note-box input { flex-grow: 1; margin: 0; }
        .add-note-box button { width: auto; margin: 0; padding: 0 20px; }

        .ticket-card { border-left: 4px solid #ff3b30; }
    </style>
</head>
<body>

    <div class="top-bar" id="headerTitle">Панель управления</div>

    <div class="container" id="mainContainer">
        
        <!-- ЭКРАН 1: СТАТИСТИКА -->
        <div id="tab-stats" class="tab-content active">
            <div id="loadingStats" class="loader" style="display: none;"><i class="fa-solid fa-circle-notch fa-spin"></i> Загрузка данных...</div>
            
            <div id="statsContent" style="display: none;">
                <div class="money-card">
                    <h2 id="bossMoney">0 ₽</h2>
                    <p>С платных вызовов в этом месяце</p>
                </div>

                <div class="card">
                    <h3 style="margin-top: 0; border-bottom: 2px solid #007aff; padding-bottom: 8px;"><i class="fa-solid fa-trophy" style="color:#ffb300;"></i> Топ Мастеров</h3>
                    <ul class="top-list" id="topMastersList"></ul>
                </div>

                <div class="card">
                    <h3 style="margin-top: 0; border-bottom: 2px solid #34c759; padding-bottom: 8px;"><i class="fa-solid fa-headset" style="color:#34c759;"></i> Топ Диспетчеров</h3>
                    <ul class="top-list" id="topDispatchersList"></ul>
                </div>
            </div>
        </div>

        <!-- ЭКРАН 2: В РАБОТЕ (Горящие) -->
        <div id="tab-active" class="tab-content">
            <div class="card" style="background: #fff0f0; color: #ff3b30; border: none; text-align: center; margin-bottom: 15px;">
                <h3 style="margin: 0 0 5px 0;"><i class="fa-solid fa-fire"></i> В работе</h3>
                <p style="margin: 0; font-size: 13px;">Заявки, на которые мастера еще не съездили.</p>
            </div>
            <div id="activeTicketsContainer"></div>
        </div>

        <!-- ЭКРАН 3: БЛОКНОТ (План на день) -->
        <div id="tab-notes" class="tab-content">
            <div class="add-note-box">
                <input type="text" class="form-control" id="newNoteInput" placeholder="Новая задача (напр: Купить трубы)">
                <button class="btn btn-primary" onclick="addNote()"><i class="fa-solid fa-plus"></i></button>
            </div>
            <div id="notesContainer"></div>
        </div>

        <!-- ЭКРАН 4: ПРОФИЛЬ -->
        <div id="tab-profile" class="tab-content">
            <div class="card" style="text-align: center;">
                <div style="background: #e5e5ea; color: #1c1c1e; width: 60px; height: 60px; border-radius: 30px; display: flex; align-items: center; justify-content: center; font-size: 24px; margin: 0 auto 15px auto;">
                    <i class="fa-solid fa-user-secret"></i>
                </div>
                <h2 style="margin: 0 0 5px 0; color: #1c1c1e;" id="profileName">Шеф</h2>
                <p style="margin: 0 0 20px 0; color: #8e8e93; font-weight: 600;">Руководитель</p>
                <button class="btn btn-danger" onclick="logout()"><i class="fa-solid fa-arrow-right-from-bracket"></i> Выйти</button>
            </div>
        </div>

    </div>

    <!-- НИЖНЕЕ МЕНЮ -->
    <div class="bottom-nav" id="bottomNav">
        <div class="nav-item active" onclick="switchTab('stats')" id="nav-stats"><i class="fa-solid fa-chart-pie"></i><span>Сводка</span></div>
        <div class="nav-item" onclick="switchTab('active')" id="nav-active"><i class="fa-solid fa-fire"></i><span>В работе</span></div>
        <div class="nav-item" onclick="switchTab('notes')" id="nav-notes"><i class="fa-solid fa-list-check"></i><span>План</span></div>
        <div class="nav-item" onclick="switchTab('profile')" id="nav-profile"><i class="fa-solid fa-user"></i><span>Профиль</span></div>
    </div>

    <script>
        // === ВАЖНО: ВСТАВЬ СВОЮ ССЫЛКУ НИЖЕ ===
        const URL_GOOGLE_SERVER = "https://script.google.com/macros/s/AKfycby7iLGZuySy2ZtphSWBgk0bkRteCTo7jn71apvREIXJVIw-ssVZvFwoeD1zgx3Slhi99A/exec";
        
        let currentUser = null;
        let notes = [];

        window.onload = async function() {
            const userStr = localStorage.getItem("currentUser");
            if (!userStr) { window.location.replace("index.html"); return; }
            currentUser = JSON.parse(userStr);
            if (currentUser.role !== "шеф") { window.location.replace("index.html"); return; }

            document.getElementById("profileName").innerText = currentUser.name;
            
            // ЗАЩИТА ОТ СВАЙПОВ
            if (!window.location.hash) { history.replaceState({tab: 'stats'}, "", "#stats"); } 
            else { applyTab(window.location.hash.replace('#', '')); }

            // Загружаем заметки из памяти телефона шефа
            const savedNotes = localStorage.getItem("bossNotes");
            if (savedNotes) notes = JSON.parse(savedNotes);
            renderNotes();

            await loadBossData();
        };

        window.addEventListener('popstate', (event) => {
            if (event.state && event.state.tab) applyTab(event.state.tab);
            else applyTab('stats');
        });

        function switchTab(tabName) {
            history.pushState({tab: tabName}, "", "#" + tabName);
            applyTab(tabName);
        }

        function applyTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
            
            const tabEl = document.getElementById('tab-' + tabName);
            const navEl = document.getElementById('nav-' + tabName);
            if(tabEl) tabEl.classList.add('active');
            if(navEl) navEl.classList.add('active');
            
            const titles = { 'stats': 'Панель управления', 'active': 'Горящие заявки', 'notes': 'План на день', 'profile': 'Настройки' };
            document.getElementById('headerTitle').innerText = titles[tabName];
            
            if (tabName === 'stats' || tabName === 'active') loadBossData();
        }

        // ================= УМНАЯ ЗАГРУЗКА ИЗ ГУГЛА (С КЭШЕМ) =================
        
        async function loadBossData() {
            const loadingSpinner = document.getElementById("loadingStats");
            const statsContent = document.getElementById("statsContent");

            // 1. ИЩЕМ КЭШ В ТЕЛЕФОНЕ (МОМЕНТАЛЬНАЯ ОТРИСОВКА)
            const cachedData = localStorage.getItem("cachedBossData");
            if (cachedData) {
                loadingSpinner.style.display = "none";
                statsContent.style.display = "block";
                renderBossData(JSON.parse(cachedData)); // Рисуем старые данные мгновенно
            } else {
                loadingSpinner.style.display = "block";
                statsContent.style.display = "none";
            }

            // 2. ИДЕМ В ГУГЛ ЗА СВЕЖИМИ ДАННЫМИ (В ФОНЕ)
            try {
                const response = await fetch(URL_GOOGLE_SERVER + "?action=getBossData");
                const data = await response.json();
                
                loadingSpinner.style.display = "none";
                statsContent.style.display = "block";
                
                // Сохраняем свежие данные в память
                localStorage.setItem("cachedBossData", JSON.stringify(data));
                
                // Плавно обновляем экран свежими цифрами
                renderBossData(data);
            } catch (e) {
                if (!cachedData) {
                    loadingSpinner.innerHTML = '<i class="fa-solid fa-triangle-exclamation" style="color:red;"></i> Ошибка сети';
                }
            }
        }

        // Вспомогательная функция отрисовки HTML
        function renderBossData(data) {
            // РИСУЕМ ДЕНЬГИ
            document.getElementById("bossMoney").innerText = data.paidMoneyMonth + " ₽";

            // РИСУЕМ ТОП МАСТЕРОВ
            const mastersList = document.getElementById("topMastersList");
            mastersList.innerHTML = "";
            let mKeys = Object.keys(data.topMasters).sort((a,b) => data.topMasters[b] - data.topMasters[a]);
            mKeys.forEach(k => mastersList.innerHTML += `<li><span>${k}</span> <span>${data.topMasters[k]} шт.</span></li>`);

            // РИСУЕМ ТОП ДИСПЕТЧЕРОВ
            const dispList = document.getElementById("topDispatchersList");
            dispList.innerHTML = "";
            let dKeys = Object.keys(data.topDispatchers).sort((a,b) => data.topDispatchers[b] - data.topDispatchers[a]);
            dKeys.forEach(k => dispList.innerHTML += `<li><span>${k}</span> <span>${data.topDispatchers[k]} шт.</span></li>`);

            // РИСУЕМ ГОРЯЩИЕ ЗАЯВКИ
            const activeContainer = document.getElementById("activeTicketsContainer");
            activeContainer.innerHTML = "";
            if (data.activeTickets.length === 0) {
                activeContainer.innerHTML = "<div class='card' style='text-align:center; color:#8e8e93;'>Сейчас нет горящих заявок. Все работают!</div>";
            } else {
                data.activeTickets.forEach(t => {
                    activeContainer.innerHTML += `
                        <div class="card ticket-card">
                            <div style="font-size:12px; color:#ff3b30; font-weight:bold; margin-bottom:5px;"><i class="fa-regular fa-clock"></i> В ожидании</div>
                            <div style="font-weight: bold; font-size: 16px; margin-bottom: 4px;">${t.address}</div>
                            <div style="font-size: 14px; color: #3a3a3c; margin-bottom: 8px;">${t.problem}</div>
                            <div style="font-size: 13px; color: #8e8e93; border-top: 1px solid #eee; padding-top: 8px;"><i class="fa-solid fa-helmet-safety"></i> Назначен: <b>${t.master}</b></div>
                        </div>`;
                });
            }
        }

        // ================= ЛОГИКА БЛОКНОТА (ЗАМЕТКИ) =================
        function renderNotes() {
            const container = document.getElementById("notesContainer");
            container.innerHTML = "";
            if (notes.length === 0) {
                container.innerHTML = "<p style='text-align:center; color:#8e8e93;'>План пуст. Добавьте первую задачу!</p>";
                return;
            }
            
            notes.forEach((note, index) => {
                const div = document.createElement("div");
                div.className = "note-item " + (note.done ? "done" : "");
                
                // ЭКШН-КНОПКА С КОПИРОВАНИЕМ
                div.innerHTML = `
                    <input type="checkbox" class="note-checkbox" ${note.done ? 'checked' : ''} onchange="toggleNote(${index})">
                    <div class="note-text" id="note-text-${index}">${note.text}</div>
                    <button class="note-copy-btn" onclick="copyNote(${index}, this)"><i class="fa-regular fa-copy"></i> Копия</button>
                    <div class="note-delete" onclick="deleteNote(${index})"><i class="fa-solid fa-xmark"></i></div>
                `;
                container.appendChild(div);
            });
            localStorage.setItem("bossNotes", JSON.stringify(notes));
        }

        function addNote() {
            const input = document.getElementById("newNoteInput");
            const text = input.value.trim();
            if (text) {
                notes.unshift({ text: text, done: false }); // Добавляем наверх списка
                input.value = "";
                renderNotes();
            }
        }

        function toggleNote(index) {
            notes[index].done = !notes[index].done;
            renderNotes();
        }

        function deleteNote(index) {
            notes.splice(index, 1);
            renderNotes();
        }

        // МАГИЯ КОПИРОВАНИЯ В БУФЕР ОБМЕНА (ДЛЯ WHATSAPP)
        function copyNote(index, btnElement) {
            const textToCopy = notes[index].text;
            navigator.clipboard.writeText(textToCopy).then(() => {
                // Визуальный эффект успешного копирования
                const originalHTML = btnElement.innerHTML;
                btnElement.innerHTML = '<i class="fa-solid fa-check"></i> В буфере!';
                btnElement.style.background = "#34c759";
                btnElement.style.color = "white";
                setTimeout(() => {
                    btnElement.innerHTML = originalHTML;
                    btnElement.style.background = "#e5f1ff";
                    btnElement.style.color = "#007aff";
                }, 1500);
            }).catch(err => {
                alert("Ошибка копирования: " + err);
            });
        }

        function logout() { localStorage.removeItem("currentUser"); window.location.replace("index.html"); }
    </script>
      <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(() => console.log('Service Worker зарегистрирован'))
                .catch(err => console.log('Ошибка SW', err));
        }
    </script>
</body>
</html>
